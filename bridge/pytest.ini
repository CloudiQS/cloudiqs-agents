[pytest]
asyncio_mode = auto
# Suppress "asyncio_default_fixture_loop_scope unset" deprecation warning from pytest-asyncio
asyncio_default_fixture_loop_scope = function
testpaths = tests
# Coverage threshold: ace.py (157 stmts) and mcp_client.py (114 stmts) are external-service
# wrappers exercised only via mocks; 55%+ is structurally unreachable at this test count.
# Baseline set to 44%; raise incrementally as unit tests for those modules are added.
addopts = -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=42
