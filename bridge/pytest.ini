[pytest]
asyncio_mode = auto
# Suppress "asyncio_default_fixture_loop_scope unset" deprecation warning from pytest-asyncio
asyncio_default_fixture_loop_scope = function
testpaths = tests
# Coverage threshold: ace.py (186 stmts), hubspot.py (252 stmts), and mcp_client.py
# are external-service wrappers exercised only via integration tests. Large implementations
# pull total coverage down. Baseline set to 30%; raise incrementally as unit tests added.
addopts = -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=30
