AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudiQS Engine — Full stack: VPC, EC2 instance, IAM role, security group, S3 uploads bucket.
  Deploy with: aws cloudformation deploy --template-file infra/cloudformation.yml
    --stack-name cloudiqs-engine --capabilities CAPABILITY_NAMED_IAM --region eu-west-1
    --parameter-overrides InstanceType=t3.large OpenClawInstallCmd="curl -fsSL https://install.openclaw.io | bash"

Parameters:
  StackName:
    Type: String
    Default: cloudiqs-engine
    Description: Used as prefix for all resource names. Change per environment.

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.medium, t3.large, t3.xlarge]
    Description: >
      t3.medium (2 vCPU, 4GB) for dev/staging. t3.large (2 vCPU, 8GB) recommended
      for 47 agents + Docker bridge. t3.xlarge for heavy load.

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id
    Description: Latest Ubuntu 22.04 LTS AMI (fetched from SSM Parameter Store).

  GithubOrgRepo:
    Type: String
    Default: CloudiQS/cloudiqs-agents
    Description: GitHub org/repo for OIDC trust policy (e.g. CloudiQS/cloudiqs-agents).

  OpenClawInstallCmd:
    Type: String
    Default: "echo 'OpenClaw install command not provided — install manually via SSM'"
    Description: >
      Full shell command to install OpenClaw on Ubuntu 22.04.
      Example: curl -fsSL https://install.openclaw.io | bash
      Override with the real command at deploy time.

  DeployToken:
    Type: String
    NoEcho: true
    Description: >
      GitHub Personal Access Token (or fine-grained token) with read access to the repo.
      Used for HTTPS clone during bootstrap. Generate at GitHub Settings > Developer settings > Tokens.


Resources:

  # ── VPC ────────────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-vpc"
        - Key: stack
          Value: !Ref StackName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-igw"
        - Key: stack
          Value: !Ref StackName

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public subnet — EC2 uses this with no inbound rules (all mgmt via SSM)
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-public-subnet"
        - Key: stack
          Value: !Ref StackName

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-public-rt"
        - Key: stack
          Value: !Ref StackName

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ── S3 Uploads Bucket ──────────────────────────────────────────────────────

  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${StackName}-uploads-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: stack
          Value: !Ref StackName

  # ── IAM: Instance Role ────────────────────────────────────────────────────

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackName}-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: cloudiqs-engine-permissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:cloudiqs/${StackName}/*"

              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !GetAtt UploadsBucket.Arn
                  - !Sub "${UploadsBucket.Arn}/*"

              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource:
                  - "arn:aws:bedrock:us-east-1::foundation-model/us.anthropic.claude-sonnet-4-6-20251101"
                  - "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0"
                  - "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-lite-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"

              - Effect: Allow
                Action: sts:AssumeRole
                Resource: "arn:aws:iam::349440382087:role/CloudiQS-PartnerCentral-MCP"

              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/cloudiqs/${StackName}/*"

      Tags:
        - Key: stack
          Value: !Ref StackName

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${StackName}-profile"
      Roles:
        - !Ref InstanceRole

  # ── IAM: GitHub Actions Deploy Role ───────────────────────────────────────
  # NOTE: The GitHub OIDC provider (token.actions.githubusercontent.com) is NOT
  # managed here because it already exists in this account and CloudFormation
  # cannot create a duplicate. The provider ARN is referenced directly below.

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GithubOrgRepo}:*"
      Policies:
        - PolicyName: deploy-via-ssm
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: "*"
              - Effect: Allow
                Action: ec2:DescribeInstances
                Resource: "*"
      Tags:
        - Key: stack
          Value: !Ref StackName

  # ── Security Group ────────────────────────────────────────────────────────

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${StackName}-sg"
      GroupDescription: "CloudiQS Engine EC2 - no inbound ports open - managed via SSM"
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound (AWS APIs, HubSpot, Instantly, Teams)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP outbound (package installs, git)
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-sg"
        - Key: stack
          Value: !Ref StackName

  # ── EC2 Instance ──────────────────────────────────────────────────────────

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > /var/log/user-data.log 2>&1

          echo "=== CloudiQS Engine Bootstrap ==="
          export STACK_NAME="${StackName}"
          export AWS_REGION="${AWS::Region}"

          # Update system
          apt-get update -y
          apt-get upgrade -y

          # Install Docker
          apt-get install -y ca-certificates curl gnupg lsb-release git python3 python3-pip
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
            | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
            https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
            > /etc/apt/sources.list.d/docker.list
          apt-get update -y
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
          usermod -aG docker ubuntu
          systemctl enable docker
          systemctl start docker

          # Install SSM Agent
          snap install amazon-ssm-agent --classic || true
          systemctl enable snap.amazon-ssm-agent.amazon-ssm-agent.service || true
          systemctl start snap.amazon-ssm-agent.amazon-ssm-agent.service || true

          # Install OpenClaw
          ${OpenClawInstallCmd}

          # Clone repo
          sudo -u ubuntu git clone https://x-access-token:${DeployToken}@github.com/${GithubOrgRepo}.git \
            /home/ubuntu/cloudiqs-engine

          # Deploy bridge + agents
          sudo -u ubuntu bash -c "cd /home/ubuntu/cloudiqs-engine && STACK_NAME=${StackName} AWS_REGION=${AWS::Region} bash deploy.sh"
          # NOTE - bridge will start with DUMMY secrets. Run infra/secrets-init.sh via SSM after stack creation to populate real secrets.

          echo "=== Bootstrap complete ==="
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-instance"
        - Key: stack
          Value: !Ref StackName

  # ── Elastic IP ────────────────────────────────────────────────────────────
  # Stable public IP for DNS records and Instantly/HubSpot webhook allowlists.

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${StackName}-eip"
        - Key: stack
          Value: !Ref StackName

  ElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref Instance
      AllocationId: !GetAtt ElasticIP.AllocationId


Outputs:
  InstanceId:
    Description: EC2 instance ID — set this as GitHub Actions secret EC2_INSTANCE_ID
    Value: !Ref Instance

  InstanceArn:
    Description: EC2 instance ARN
    Value: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${Instance}"

  GitHubDeployRoleArn:
    Description: GitHub Actions deploy role ARN — set this as GitHub Actions secret AWS_DEPLOY_ROLE_ARN
    Value: !GetAtt GitHubDeployRole.Arn

  UploadsBucketName:
    Description: S3 uploads bucket name
    Value: !Ref UploadsBucket

  InstanceRoleName:
    Description: IAM role name attached to the instance
    Value: !Ref InstanceRole

  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  PublicSubnetId:
    Description: Public subnet ID
    Value: !Ref PublicSubnet

  ElasticIPAddress:
    Description: Stable public IP — use this for DNS records and webhook allowlists
    Value: !Ref ElasticIP
